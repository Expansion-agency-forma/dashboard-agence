<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background — dark bordeaux with rounded corners -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="#170000"/>
  <!-- Subtle gold border -->
  <rect x="2" y="2" width="508" height="508" rx="94" ry="94" fill="none" stroke="#c9a84c" stroke-opacity="0.32" stroke-width="4"/>
  <!-- E letter — gold, bold, centered slightly left to leave room for the dot -->
  <text x="220" y="256" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Helvetica Neue', Arial, sans-serif" font-size="320" font-weight="800" fill="#c9a84c" text-anchor="middle" dominant-baseline="central" letter-spacing="-12">E</text>
  <!-- Gold dot — vertically centered, on the right -->
  <circle cx="380" cy="256" r="36" fill="#c9a84c"/>
</svg>
